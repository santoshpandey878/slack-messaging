version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: slack-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: slackmsg
      POSTGRES_USER: slackuser
      POSTGRES_PASSWORD: slackpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slackuser -d slackmsg"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slack-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: slack-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/slack-media --ignore-existing;
      mc anonymous set download local/slack-media;
      echo 'Bucket created';
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
