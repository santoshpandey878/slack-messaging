<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlackMsg — Messaging Demo</title>
<style>
  :root {
    --bg-dark: #1a1d21; --bg-sidebar: #19171d; --bg-main: #222529;
    --bg-input: #2c2d31; --bg-hover: #2c2d31; --bg-active: #1264a3;
    --text-primary: #d1d2d3; --text-secondary: #ababad; --text-muted: #6b6c6e;
    --accent: #1264a3; --accent-light: #1d9bd1; --green: #2bac76;
    --red: #e01e5a; --border: #333538; --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-primary); height: 100vh; overflow: hidden; }
  .app { display: flex; height: 100vh; }
  .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 16px; color: #fff; font-weight: 900; }
  .sidebar-header .tenant-info { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sidebar-section { padding: 8px 0; }
  .sidebar-section-title { padding: 4px 16px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
  .channel-list { list-style: none; }
  .channel-list li { padding: 4px 16px 4px 24px; font-size: 14px; color: var(--text-secondary); cursor: pointer; border-radius: 4px; margin: 0 8px; }
  .channel-list li:hover { background: var(--bg-hover); color: #fff; }
  .channel-list li.active { background: var(--accent); color: #fff; }
  .sidebar-actions { padding: 8px 16px; }
  .sidebar-actions button { width: 100%; padding: 6px; font-size: 12px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; margin-bottom: 4px; }
  .sidebar-actions button:hover { background: var(--bg-hover); color: #fff; }
  .sidebar-bottom { margin-top: auto; padding: 10px 16px; border-top: 1px solid var(--border); }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  .topbar { padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg-main); display: flex; align-items: center; justify-content: space-between; }
  .topbar .channel-name { font-size: 16px; font-weight: 900; color: #fff; }
  .topbar .channel-meta { font-size: 12px; color: var(--text-muted); }
  #wsStatus { font-size: 11px; padding: 3px 10px; border-radius: 10px; }
  #wsStatus.connected { background: #1a3a2a; color: var(--green); }
  #wsStatus.disconnected { background: #3a1a1a; color: var(--red); }
  .messages-area { flex: 1; overflow-y: auto; padding: 16px 20px; background: var(--bg-main); }
  .msg { display: flex; padding: 6px 0; align-items: flex-start; }
  .msg + .msg { margin-top: 2px; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 6px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; flex-shrink: 0; margin-right: 10px; margin-top: 2px; }
  .msg-body { min-width: 0; flex: 1; }
  .msg-header { display: flex; align-items: baseline; gap: 8px; }
  .msg-sender { font-weight: 900; font-size: 14px; color: #fff; }
  .msg-time { font-size: 11px; color: var(--text-muted); }
  .msg-content { font-size: 14px; color: var(--text-primary); margin-top: 2px; line-height: 1.5; word-wrap: break-word; }
  .msg-media { margin-top: 6px; }
  .msg-media img { max-width: 300px; max-height: 200px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border); }
  .msg-media a { color: var(--accent-light); font-size: 13px; }
  .msg-actions { display: flex; gap: 6px; margin-top: 4px; }
  .msg-actions button { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 2px 8px; border-radius: 12px; cursor: pointer; font-size: 11px; }
  .msg-actions button:hover { background: var(--bg-hover); color: #fff; }
  .msg-thread-indicator { font-size: 12px; color: var(--accent-light); cursor: pointer; margin-top: 4px; }
  .msg-thread-indicator:hover { text-decoration: underline; }
  .msg-reactions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .reaction-badge { display: inline-flex; align-items: center; gap: 3px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; padding: 1px 8px; font-size: 12px; cursor: pointer; }
  .reaction-badge:hover { border-color: var(--accent-light); }
  .reaction-badge.my-reaction { border-color: var(--accent); background: #1264a322; }
  .composer { padding: 12px 20px 16px; background: var(--bg-main); border-top: 1px solid var(--border); }
  .composer-box { display: flex; gap: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; align-items: center; }
  .composer-box input[type=text] { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 14px; outline: none; }
  .composer-box input[type=text]::placeholder { color: var(--text-muted); }
  .composer-box button { background: var(--accent); color: #fff; border: none; padding: 6px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 700; }
  .composer-box button:hover { background: var(--accent-light); }
  .composer-box label.file-btn { cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 0 4px; }
  .composer-box label.file-btn:hover { color: #fff; }
  .composer-box input[type=file] { display: none; }
  .media-status { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }
  .thread-panel { display: none; width: 380px; background: var(--bg-sidebar); border-left: 1px solid var(--border); flex-direction: column; flex-shrink: 0; position: absolute; right: 0; top: 0; bottom: 0; z-index: 10; }
  .thread-panel.show { display: flex; }
  .thread-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .thread-header h3 { color: #fff; font-size: 15px; font-weight: 900; }
  .thread-header button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
  .thread-messages { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .thread-composer { padding: 10px 16px; border-top: 1px solid var(--border); }
  .thread-composer .composer-box { padding: 6px 10px; }
  .emoji-picker { display: none; position: absolute; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; z-index: 20; }
  .emoji-picker.show { display: flex; flex-wrap: wrap; gap: 4px; max-width: 220px; }
  .emoji-picker span { cursor: pointer; font-size: 20px; padding: 2px; border-radius: 4px; }
  .emoji-picker span:hover { background: var(--bg-hover); }
  .panel-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .panel-overlay.show { display: flex; }
  .panel { background: var(--bg-sidebar); border-radius: 10px; padding: 24px; width: 380px; max-height: 90vh; overflow-y: auto; }
  .panel h3 { color: #fff; font-size: 18px; margin-bottom: 16px; }
  .panel label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 3px; margin-top: 10px; }
  .panel input, .panel select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-input); color: var(--text-primary); font-size: 13px; }
  .panel .btn { display: inline-block; padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 700; margin-top: 12px; margin-right: 6px; }
  .panel .btn-primary { background: var(--accent); color: #fff; }
  .panel .btn-primary:hover { background: var(--accent-light); }
  .panel .btn-secondary { background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border); }
  .panel .info { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
  .panel .error { color: var(--red); }
  .panel hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .log-toggle { position: fixed; bottom: 10px; right: 10px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 11px; z-index: 50; }
  .log-panel { position: fixed; bottom: 40px; right: 10px; width: 500px; max-height: 250px; background: #111; border: 1px solid var(--border); border-radius: var(--radius); overflow-y: auto; padding: 8px; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #0f0; z-index: 50; display: none; }
  .log-panel.show { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header"><h2 id="workspaceName">SlackMsg</h2><div class="tenant-info" id="userInfo">Not logged in</div></div>
    <div class="sidebar-section"><div class="sidebar-section-title">Channels</div><ul class="channel-list" id="channelList"></ul></div>
    <div class="sidebar-actions">
      <button onclick="showPanel('createChPanel')">+ Create Channel</button>
      <button onclick="showPanel('invitePanel')">+ Invite User</button>
      <button onclick="showPanel('dmPanel')">+ Direct Message</button>
      <button onclick="listChannels()">Refresh Channels</button>
    </div>
    <div class="sidebar-bottom"><button style="width:100%;padding:6px;font-size:12px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;" onclick="showPanel('authPanel')">Login / Register</button></div>
  </div>
  <div class="main">
    <div class="topbar"><div><div class="channel-name" id="activeChannelName">Select a channel</div><div class="channel-meta" id="activeChannelMeta"></div></div><div id="wsStatus" class="disconnected">Disconnected</div></div>
    <div class="messages-area" id="messages"></div>
    <div class="composer">
      <div class="composer-box">
        <label class="file-btn" title="Upload media"><input type="file" id="mediaFile" onchange="uploadAndSendMedia()" />&#x1F4CE;</label>
        <input type="text" id="msgInput" placeholder="Message #channel..." onkeydown="if(event.key==='Enter')sendMsg()" />
        <button onclick="sendMsg()">Send</button>
      </div>
      <div class="media-status" id="mediaInfo"></div>
    </div>
    <div class="thread-panel" id="threadPanel">
      <div class="thread-header"><h3>Thread</h3><button onclick="closeThread()">&times;</button></div>
      <div class="thread-messages" id="threadMessages"></div>
      <div class="thread-composer"><div class="composer-box"><input type="text" id="threadInput" placeholder="Reply in thread..." onkeydown="if(event.key==='Enter')sendThreadReply()" /><button onclick="sendThreadReply()">Reply</button></div></div>
    </div>
  </div>
</div>
<div class="panel-overlay" id="authPanel"><div class="panel"><h3>Login or Register</h3><label>Workspace (tenant slug)</label><input id="slug" value="porter" /><label>Email</label><input id="email" value="santosh@porter.com" /><label>Display Name (for register)</label><input id="name" value="Santosh" /><label>Password</label><input id="pass" type="password" value="test123456" /><div><button class="btn btn-primary" onclick="login()">Login</button><button class="btn btn-secondary" onclick="register()">Register New Workspace</button><button class="btn btn-secondary" onclick="hidePanel('authPanel')">Cancel</button></div><div class="info" id="authInfo"></div></div></div>
<div class="panel-overlay" id="createChPanel"><div class="panel"><h3>Create Channel</h3><label>Name</label><input id="chName" value="general" /><label>Type</label><select id="chType"><option value="PUBLIC">Public</option><option value="PRIVATE">Private</option></select><div><button class="btn btn-primary" onclick="createChannel()">Create</button><button class="btn btn-secondary" onclick="hidePanel('createChPanel')">Cancel</button></div></div></div>
<div class="panel-overlay" id="invitePanel"><div class="panel"><h3>Invite User to Workspace</h3><label>Email</label><input id="inviteEmail" placeholder="bob@company.com" /><label>Display Name</label><input id="inviteName" placeholder="Bob" /><label>Password</label><input id="invitePass" type="password" placeholder="password" /><div><button class="btn btn-primary" onclick="inviteUser()">Invite</button><button class="btn btn-secondary" onclick="hidePanel('invitePanel')">Cancel</button></div><div class="info" id="inviteInfo"></div><hr><label>Add invited user to current channel</label><input id="addUserId" placeholder="User ID (auto-filled after invite)" /><button class="btn btn-secondary" onclick="addMember()">Add to Channel</button></div></div>
<div class="panel-overlay" id="dmPanel"><div class="panel"><h3>Start Direct Message</h3><label>User ID</label><input id="dmUserId" placeholder="Paste user UUID" /><div><button class="btn btn-primary" onclick="createDm()">Start DM</button><button class="btn btn-secondary" onclick="hidePanel('dmPanel')">Cancel</button></div></div></div>
<button class="log-toggle" onclick="document.getElementById('logPanel').classList.toggle('show')">Activity Log</button>
<div class="log-panel" id="logPanel"></div>
<script>
const BASE = 'http://localhost:8080';
let token=null,ws=null,channelId=null,channels=[];
let myUserId=null,myDisplayName=null,myTenantId=null,activeThreadId=null;
const userNames={},messageReactions={};
const avatarColors=['#e01e5a','#36c5f0','#2eb67d','#ecb22e','#8b5cf6','#e94560','#06b6d4','#f59e0b'];
const QUICK_EMOJIS=['\uD83D\uDC4D','\uD83D\uDC4E','\u2764\uFE0F','\uD83D\uDE02','\uD83D\uDE2E','\uD83C\uDF89','\uD83D\uDE4F','\uD83D\uDD25'];
function getAvatarColor(n){let h=0;for(let i=0;i<(n||'').length;i++)h=n.charCodeAt(i)+((h<<5)-h);return avatarColors[Math.abs(h)%avatarColors.length];}
function getInitial(n){return(n||'?')[0].toUpperCase();}
function showPanel(id){document.getElementById(id).classList.add('show');}
function hidePanel(id){document.getElementById(id).classList.remove('show');}
function toast(msg,isError){const t=document.createElement('div');t.style.cssText='position:fixed;top:16px;right:16px;padding:10px 20px;border-radius:6px;font-size:13px;z-index:200;animation:fadeIn 0.3s;max-width:400px;';t.style.background=isError?'#5c1a1a':'#1a3a2a';t.style.color=isError?'#e01e5a':'#2bac76';t.style.border='1px solid '+(isError?'#e01e5a33':'#2bac7633');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function logMsg(msg){const el=document.getElementById('logPanel');el.innerHTML+='<div>'+new Date().toLocaleTimeString()+' '+msg.replace(/</g,'&lt;')+'</div>';el.scrollTop=el.scrollHeight;}
function setStatus(c){const el=document.getElementById('wsStatus');el.className=c?'connected':'disconnected';el.textContent=c?'Connected':'Disconnected';}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
async function api(method,path,body){const opts={method,headers:{'Content-Type':'application/json'}};if(token)opts.headers['Authorization']='Bearer '+token;if(body)opts.body=JSON.stringify(body);logMsg('-> '+method+' '+path);const res=await fetch(BASE+path,opts);const data=await res.json();logMsg('<- '+res.status+' '+(data.success?'OK':data.message));return data;}
async function register(){const r=await api('POST','/api/v1/auth/register',{tenantName:document.getElementById('slug').value,tenantSlug:document.getElementById('slug').value,email:document.getElementById('email').value,displayName:document.getElementById('name').value,password:document.getElementById('pass').value});if(r.success){setAuth(r.data);hidePanel('authPanel');listChannels();}else{document.getElementById('authInfo').innerHTML='<span class="error">'+r.message+'</span>';}}
async function login(){const r=await api('POST','/api/v1/auth/login',{tenantSlug:document.getElementById('slug').value,email:document.getElementById('email').value,password:document.getElementById('pass').value});if(r.success){setAuth(r.data);hidePanel('authPanel');listChannels();}else{document.getElementById('authInfo').innerHTML='<span class="error">'+r.message+'</span>';}}
function setAuth(data){token=data.token;myUserId=data.userId;myDisplayName=data.displayName;myTenantId=data.tenantId;userNames[myUserId]=myDisplayName;document.getElementById('workspaceName').textContent=document.getElementById('slug').value;document.getElementById('userInfo').innerHTML=data.displayName+' <span style="color:var(--text-muted)">('+data.role+')</span>'+'<div style="font-size:10px;color:var(--text-muted);margin-top:2px;cursor:pointer" onclick="navigator.clipboard.writeText(\''+data.userId+'\');toast(\'User ID copied\')" title="Click to copy">User: '+data.userId.substring(0,8)+'...</div>'+'<div style="font-size:10px;color:var(--text-muted);cursor:pointer" onclick="navigator.clipboard.writeText(\''+data.tenantId+'\');toast(\'Tenant ID copied\')" title="Click to copy">Tenant: '+data.tenantId.substring(0,8)+'...</div>';document.getElementById('authInfo').textContent='Logged in as '+data.displayName;toast('Logged in as '+data.displayName);connectWs();}
function connectWs(){if(ws)ws.close();ws=new WebSocket('ws://localhost:8080/ws?token='+token);ws.onopen=()=>{setStatus(true);};ws.onclose=()=>{setStatus(false);};ws.onerror=()=>{logMsg('WS ERROR');};ws.onmessage=(e)=>{logMsg('WS <- '+e.data.substring(0,120));try{const msg=JSON.parse(e.data);handleWsEvent(msg);}catch(err){}};}
function handleWsEvent(msg){if(msg.type==='message.new'){const d=msg.data||msg.message||{};if(d.senderId===myUserId)return;if(msg.channelId!==channelId)return;const name=d.senderName||userNames[d.senderId]||(d.senderId||'').substring(0,8);appendMessage(name,d.content,d.createdAt,d.mediaUrl,d.messageType,d.id,null,0);}else if(msg.type==='thread.reply'){const d=msg.data||{};if(msg.channelId!==channelId)return;const parentEl=document.querySelector('[data-msg-id="'+d.parentMessageId+'"] .msg-thread-indicator');if(parentEl){const cur=parseInt(parentEl.dataset.count||'0')+1;parentEl.dataset.count=cur;parentEl.textContent=cur+' '+(cur===1?'reply':'replies');parentEl.style.display='block';}if(activeThreadId===d.parentMessageId&&d.senderId!==myUserId){const name=d.senderName||userNames[d.senderId]||(d.senderId||'').substring(0,8);appendThreadMessage(name,d.content,d.createdAt,d.id);}}else if(msg.type==='reaction.added'||msg.type==='reaction.removed'){const d=msg.data||{};if(msg.channelId!==channelId)return;updateReactionDisplay(d.messageId,d.emoji,d.userId,msg.type==='reaction.added');}}
async function listChannels(){const r=await api('GET','/api/v1/channels');if(!r.success)return;channels=r.data;const list=document.getElementById('channelList');list.innerHTML='';r.data.forEach(c=>{const li=document.createElement('li');const icon=c.type==='DM'?'\uD83D\uDCAC':c.type==='PRIVATE'?'\uD83D\uDD12':'#';li.textContent=icon+' '+(c.name||'Direct Message');li.onclick=()=>selectChannel(c);if(c.id===channelId)li.className='active';list.appendChild(li);});}
function selectChannel(ch){channelId=ch.id;closeThread();const prefix=ch.type==='DM'?'\uD83D\uDCAC ':ch.type==='PRIVATE'?'\uD83D\uDD12 ':'# ';const dn=ch.name||'Direct Message';document.getElementById('activeChannelName').textContent=prefix+dn;document.getElementById('activeChannelMeta').textContent=ch.type+' | '+(ch.memberCount||0)+' members | ID: '+ch.id.substring(0,8)+'...';document.getElementById('msgInput').placeholder='Message '+dn+'...';listChannels();loadHistory();}
async function createChannel(){const name=document.getElementById('chName').value;const type=document.getElementById('chType').value;const r=await api('POST','/api/v1/channels',{name,type});if(r.success){hidePanel('createChPanel');selectChannel(r.data);listChannels();toast('Channel "'+name+'" created');}else{toast(r.message,true);}}
async function createDm(){const userId=document.getElementById('dmUserId').value;if(!userId){toast('Enter a user ID',true);return;}const r=await api('POST','/api/v1/dm',{userId});if(r.success){hidePanel('dmPanel');selectChannel(r.data);listChannels();toast('DM opened');}else{toast(r.message,true);}}
async function inviteUser(){const email=document.getElementById('inviteEmail').value;const name=document.getElementById('inviteName').value||email.split('@')[0];const pass=document.getElementById('invitePass').value||'password123';if(!email){toast('Email required',true);return;}const r=await api('POST','/api/v1/users',{email,displayName:name,password:pass});if(r.success){document.getElementById('addUserId').value=r.data.userId;document.getElementById('dmUserId').value=r.data.userId;document.getElementById('inviteInfo').innerHTML='Invited <b>'+r.data.displayName+'</b><br><span style="font-size:10px;color:var(--text-muted)">ID: '+r.data.userId+'</span>';userNames[r.data.userId]=r.data.displayName;toast(r.data.displayName+' invited to workspace');}else{document.getElementById('inviteInfo').innerHTML='<span class="error">'+r.message+'</span>';toast(r.message,true);}}
async function addMember(){const userId=document.getElementById('addUserId').value;if(!channelId||!userId){toast('Select a channel and enter user ID',true);return;}const r=await api('POST','/api/v1/channels/'+channelId+'/members',{userIds:[userId]});if(r.success){toast(r.message);}else{toast(r.message,true);}}
async function sendMsg(){const content=document.getElementById('msgInput').value;if(!channelId||!content)return;const r=await api('POST','/api/v1/channels/'+channelId+'/messages',{content});if(r.success){appendMessage(myDisplayName+' (You)',content,r.data.createdAt,r.data.mediaUrl,r.data.messageType,r.data.id,null,0);document.getElementById('msgInput').value='';}}
async function uploadAndSendMedia(){const fi=document.getElementById('mediaFile');const info=document.getElementById('mediaInfo');if(!channelId||!fi.files.length)return;const file=fi.files[0];info.textContent='Uploading '+file.name+'...';const u=await api('POST','/api/v1/media/upload-url',{fileName:file.name,contentType:file.type||'application/octet-stream',sizeBytes:file.size});if(!u.success){info.textContent='Error: '+u.message;fi.value='';return;}try{await fetch(u.data.uploadUrl,{method:'PUT',headers:{'Content-Type':file.type},body:file});}catch(e){}const m=await api('POST','/api/v1/channels/'+channelId+'/messages',{content:file.name,mediaUrl:u.data.readUrl,mediaType:file.type});if(m.success){appendMessage(myDisplayName+' (You)',m.data.content,m.data.createdAt,m.data.mediaUrl,m.data.messageType,m.data.id,null,0);}fi.value='';info.textContent='';}
async function loadHistory(){if(!channelId)return;const r=await api('GET','/api/v1/channels/'+channelId+'/messages?limit=50');if(!r.success)return;document.getElementById('messages').innerHTML='';r.data.reverse().forEach(m=>{const name=m.senderId===myUserId?myDisplayName+' (You)':(m.senderName||userNames[m.senderId]||m.senderId.substring(0,8));appendMessage(name,m.content,m.createdAt,m.mediaUrl,m.messageType,m.id,m.parentMessageId,m.replyCount||0);});}
function appendMessage(sender,content,time,mediaUrl,messageType,msgId,parentMsgId,replyCount){const el=document.getElementById('messages');const t=time?new Date(time).toLocaleTimeString():'';const color=getAvatarColor(sender);const initial=getInitial(sender);let mediaHtml='';if(mediaUrl&&mediaUrl!=='null'){if(mediaUrl.match(/\.(png|jpg|jpeg|gif|webp)/i)){mediaHtml='<div class="msg-media"><img src="'+escapeHtml(mediaUrl)+'" onclick="window.open(this.src)" onerror="this.outerHTML=\'<a href=&quot;'+escapeHtml(mediaUrl)+'&quot; target=_blank>Download</a>\'"/></div>';}else{mediaHtml='<div class="msg-media"><a href="'+escapeHtml(mediaUrl)+'" target="_blank">&#x1F4CE; Download '+escapeHtml(content||'file')+'</a></div>';}}const threadHtml=(replyCount>0)?'<div class="msg-thread-indicator" data-count="'+replyCount+'" onclick="openThread(\''+msgId+'\')">'+replyCount+' '+(replyCount===1?'reply':'replies')+'</div>':'<div class="msg-thread-indicator" data-count="0" style="display:none"></div>';const div=document.createElement('div');div.className='msg';div.dataset.msgId=msgId||'';div.innerHTML='<div class="msg-avatar" style="background:'+color+'">'+initial+'</div><div class="msg-body"><div class="msg-header"><span class="msg-sender">'+escapeHtml(sender)+'</span><span class="msg-time">'+escapeHtml(t)+'</span></div><div class="msg-content">'+escapeHtml(content||'')+mediaHtml+'</div><div class="msg-reactions" id="reactions-'+msgId+'"></div>'+threadHtml+'<div class="msg-actions"><button onclick="openThread(\''+msgId+'\')">&#x1F4AC; Reply</button><button onclick="showEmojiPicker(this,\''+msgId+'\')">&#x1F600; React</button></div></div>';el.appendChild(div);el.scrollTop=el.scrollHeight;if(msgId)loadReactions(msgId);}
async function loadReactions(msgId){const r=await api('GET','/api/v1/channels/'+channelId+'/messages/'+msgId+'/reactions');if(!r.success)return;messageReactions[msgId]=r.data;renderReactions(msgId);}
function renderReactions(msgId){const c=document.getElementById('reactions-'+msgId);if(!c)return;const reactions=messageReactions[msgId]||[];const groups={};reactions.forEach(r=>{if(!groups[r.emoji])groups[r.emoji]=[];groups[r.emoji].push(r.userId);});c.innerHTML='';Object.entries(groups).forEach(([emoji,uids])=>{const isMine=uids.includes(myUserId);const b=document.createElement('span');b.className='reaction-badge'+(isMine?' my-reaction':'');b.textContent=emoji+' '+uids.length;b.onclick=()=>toggleReaction(msgId,emoji,isMine);c.appendChild(b);});}
function updateReactionDisplay(msgId,emoji,userId,added){if(!messageReactions[msgId])messageReactions[msgId]=[];if(added){messageReactions[msgId].push({emoji,userId});}else{messageReactions[msgId]=messageReactions[msgId].filter(r=>!(r.emoji===emoji&&r.userId===userId));}renderReactions(msgId);}
async function toggleReaction(msgId,emoji,already){if(already){const r=await api('DELETE','/api/v1/channels/'+channelId+'/messages/'+msgId+'/reactions/'+encodeURIComponent(emoji));if(r.success)updateReactionDisplay(msgId,emoji,myUserId,false);}else{const r=await api('POST','/api/v1/channels/'+channelId+'/messages/'+msgId+'/reactions',{emoji});if(r.success)updateReactionDisplay(msgId,emoji,myUserId,true);}}
async function addReaction(msgId,emoji){hideEmojiPicker();const r=await api('POST','/api/v1/channels/'+channelId+'/messages/'+msgId+'/reactions',{emoji});if(r.success)updateReactionDisplay(msgId,emoji,myUserId,true);else toast(r.message,true);}
let emojiPickerEl=null;
function showEmojiPicker(btn,msgId){hideEmojiPicker();const p=document.createElement('div');p.className='emoji-picker show';p.style.position='absolute';QUICK_EMOJIS.forEach(em=>{const s=document.createElement('span');s.textContent=em;s.onclick=()=>addReaction(msgId,em);p.appendChild(s);});btn.parentElement.appendChild(p);emojiPickerEl=p;setTimeout(()=>document.addEventListener('click',hideEmojiPicker,{once:true}),10);}
function hideEmojiPicker(){if(emojiPickerEl){emojiPickerEl.remove();emojiPickerEl=null;}}
async function openThread(parentMsgId){if(!parentMsgId||!channelId)return;activeThreadId=parentMsgId;document.getElementById('threadPanel').classList.add('show');document.getElementById('threadMessages').innerHTML='';const r=await api('GET','/api/v1/channels/'+channelId+'/threads/'+parentMsgId+'?limit=50');if(r.success){r.data.forEach(m=>{const name=m.senderId===myUserId?myDisplayName+' (You)':(m.senderName||m.senderId.substring(0,8));appendThreadMessage(name,m.content,m.createdAt,m.id);});}document.getElementById('threadInput').focus();}
function closeThread(){activeThreadId=null;document.getElementById('threadPanel').classList.remove('show');document.getElementById('threadMessages').innerHTML='';}
function appendThreadMessage(sender,content,time,msgId){const el=document.getElementById('threadMessages');const t=time?new Date(time).toLocaleTimeString():'';const color=getAvatarColor(sender);const initial=getInitial(sender);const div=document.createElement('div');div.className='msg';div.innerHTML='<div class="msg-avatar" style="background:'+color+';width:28px;height:28px;font-size:12px">'+initial+'</div><div class="msg-body"><div class="msg-header"><span class="msg-sender" style="font-size:13px">'+escapeHtml(sender)+'</span><span class="msg-time">'+escapeHtml(t)+'</span></div><div class="msg-content" style="font-size:13px">'+escapeHtml(content||'')+'</div></div>';el.appendChild(div);el.scrollTop=el.scrollHeight;}
async function sendThreadReply(){const content=document.getElementById('threadInput').value;if(!channelId||!activeThreadId||!content)return;const r=await api('POST','/api/v1/channels/'+channelId+'/messages',{content,parentMessageId:activeThreadId});if(r.success){appendThreadMessage(myDisplayName+' (You)',content,r.data.createdAt,r.data.id);document.getElementById('threadInput').value='';const ind=document.querySelector('[data-msg-id="'+activeThreadId+'"] .msg-thread-indicator');if(ind){const cur=parseInt(ind.dataset.count||'0')+1;ind.dataset.count=cur;ind.textContent=cur+' '+(cur===1?'reply':'replies');ind.style.display='block';}}}
window.onload=()=>showPanel('authPanel');
</script>
