<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlackMsg — Messaging Demo</title>
<style>
  :root {
    --bg-dark: #1a1d21; --bg-sidebar: #19171d; --bg-main: #222529;
    --bg-input: #2c2d31; --bg-hover: #2c2d31; --bg-active: #1264a3;
    --text-primary: #d1d2d3; --text-secondary: #ababad; --text-muted: #6b6c6e;
    --accent: #1264a3; --accent-light: #1d9bd1; --green: #2bac76;
    --red: #e01e5a; --border: #333538; --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-primary); height: 100vh; overflow: hidden; }

  /* Layout: sidebar + main */
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 16px; color: #fff; font-weight: 900; }
  .sidebar-header .tenant-info { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sidebar-section { padding: 8px 0; }
  .sidebar-section-title { padding: 4px 16px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
  .channel-list { list-style: none; }
  .channel-list li { padding: 4px 16px 4px 24px; font-size: 14px; color: var(--text-secondary); cursor: pointer; border-radius: 4px; margin: 0 8px; }
  .channel-list li:hover { background: var(--bg-hover); color: #fff; }
  .channel-list li.active { background: var(--accent); color: #fff; }
  .channel-list li .ch-icon { margin-right: 6px; font-size: 12px; }
  .sidebar-actions { padding: 8px 16px; }
  .sidebar-actions button { width: 100%; padding: 6px; font-size: 12px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; margin-bottom: 4px; }
  .sidebar-actions button:hover { background: var(--bg-hover); color: #fff; }
  .sidebar-bottom { margin-top: auto; padding: 10px 16px; border-top: 1px solid var(--border); }

  /* Main content */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Top bar */
  .topbar { padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg-main); display: flex; align-items: center; justify-content: space-between; }
  .topbar .channel-name { font-size: 16px; font-weight: 900; color: #fff; }
  .topbar .channel-meta { font-size: 12px; color: var(--text-muted); }
  #wsStatus { font-size: 11px; padding: 3px 10px; border-radius: 10px; }
  #wsStatus.connected { background: #1a3a2a; color: var(--green); }
  #wsStatus.disconnected { background: #3a1a1a; color: var(--red); }

  /* Messages area */
  .messages-area { flex: 1; overflow-y: auto; padding: 16px 20px; background: var(--bg-main); }
  .msg { display: flex; padding: 6px 0; align-items: flex-start; }
  .msg + .msg { margin-top: 2px; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 6px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; flex-shrink: 0; margin-right: 10px; margin-top: 2px; }
  .msg-body { min-width: 0; }
  .msg-header { display: flex; align-items: baseline; gap: 8px; }
  .msg-sender { font-weight: 900; font-size: 14px; color: #fff; }
  .msg-time { font-size: 11px; color: var(--text-muted); }
  .msg-content { font-size: 14px; color: var(--text-primary); margin-top: 2px; line-height: 1.5; word-wrap: break-word; }
  .msg-media { margin-top: 6px; }
  .msg-media img { max-width: 300px; max-height: 200px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border); }
  .msg-media a { color: var(--accent-light); font-size: 13px; }

  /* Composer */
  .composer { padding: 12px 20px 16px; background: var(--bg-main); border-top: 1px solid var(--border); }
  .composer-box { display: flex; gap: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; align-items: center; }
  .composer-box input[type=text] { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 14px; outline: none; }
  .composer-box input[type=text]::placeholder { color: var(--text-muted); }
  .composer-box button { background: var(--accent); color: #fff; border: none; padding: 6px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 700; }
  .composer-box button:hover { background: var(--accent-light); }
  .composer-box label.file-btn { cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 0 4px; }
  .composer-box label.file-btn:hover { color: #fff; }
  .composer-box input[type=file] { display: none; }
  .media-status { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }

  /* Panels (auth, invite, log) */
  .panel-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .panel-overlay.show { display: flex; }
  .panel { background: var(--bg-sidebar); border-radius: 10px; padding: 24px; width: 380px; max-height: 90vh; overflow-y: auto; }
  .panel h3 { color: #fff; font-size: 18px; margin-bottom: 16px; }
  .panel label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 3px; margin-top: 10px; }
  .panel input, .panel select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-input); color: var(--text-primary); font-size: 13px; }
  .panel .btn { display: inline-block; padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 700; margin-top: 12px; margin-right: 6px; }
  .panel .btn-primary { background: var(--accent); color: #fff; }
  .panel .btn-primary:hover { background: var(--accent-light); }
  .panel .btn-secondary { background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border); }
  .panel .info { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
  .panel .error { color: var(--red); }
  .panel hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* Log */
  .log-toggle { position: fixed; bottom: 10px; right: 10px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 11px; z-index: 50; }
  .log-panel { position: fixed; bottom: 40px; right: 10px; width: 500px; max-height: 250px; background: #111; border: 1px solid var(--border); border-radius: var(--radius); overflow-y: auto; padding: 8px; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #0f0; z-index: 50; display: none; }
  .log-panel.show { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2 id="workspaceName">SlackMsg</h2>
      <div class="tenant-info" id="userInfo">Not logged in</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Channels</div>
      <ul class="channel-list" id="channelList"></ul>
    </div>
    <div class="sidebar-actions">
      <button onclick="showPanel('createChPanel')">+ Create Channel</button>
      <button onclick="showPanel('invitePanel')">+ Invite User</button>
      <button onclick="showPanel('dmPanel')">+ Direct Message</button>
      <button onclick="listChannels()">Refresh Channels</button>
    </div>
    <div class="sidebar-bottom">
      <button style="width:100%;padding:6px;font-size:12px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;" onclick="showPanel('authPanel')">Login / Register</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="channel-name" id="activeChannelName">Select a channel</div>
        <div class="channel-meta" id="activeChannelMeta"></div>
      </div>
      <div id="wsStatus" class="disconnected">Disconnected</div>
    </div>
    <div class="messages-area" id="messages"></div>
    <div class="composer">
      <div class="composer-box">
        <label class="file-btn" title="Upload media">
          <input type="file" id="mediaFile" onchange="uploadAndSendMedia()" />&#x1F4CE;
        </label>
        <input type="text" id="msgInput" placeholder="Message #channel..." onkeydown="if(event.key==='Enter')sendMsg()" />
        <button onclick="sendMsg()">Send</button>
      </div>
      <div class="media-status" id="mediaInfo"></div>
    </div>
  </div>
</div>

<!-- Auth Panel -->
<div class="panel-overlay" id="authPanel">
  <div class="panel">
    <h3>Login or Register</h3>
    <label>Workspace (tenant slug)</label>
    <input id="slug" value="porter" />
    <label>Email</label>
    <input id="email" value="santosh@porter.com" />
    <label>Display Name (for register)</label>
    <input id="name" value="Santosh" />
    <label>Password</label>
    <input id="pass" type="password" value="test123456" />
    <div>
      <button class="btn btn-primary" onclick="login()">Login</button>
      <button class="btn btn-secondary" onclick="register()">Register New Workspace</button>
      <button class="btn btn-secondary" onclick="hidePanel('authPanel')">Cancel</button>
    </div>
    <div class="info" id="authInfo"></div>
  </div>
</div>

<!-- Create Channel Panel -->
<div class="panel-overlay" id="createChPanel">
  <div class="panel">
    <h3>Create Channel</h3>
    <label>Name</label>
    <input id="chName" value="general" />
    <label>Type</label>
    <select id="chType"><option value="PUBLIC">Public</option><option value="PRIVATE">Private</option></select>
    <div>
      <button class="btn btn-primary" onclick="createChannel()">Create</button>
      <button class="btn btn-secondary" onclick="hidePanel('createChPanel')">Cancel</button>
    </div>
  </div>
</div>

<!-- Invite Panel -->
<div class="panel-overlay" id="invitePanel">
  <div class="panel">
    <h3>Invite User to Workspace</h3>
    <label>Email</label>
    <input id="inviteEmail" placeholder="bob@company.com" />
    <label>Display Name</label>
    <input id="inviteName" placeholder="Bob" />
    <label>Password</label>
    <input id="invitePass" type="password" placeholder="password" />
    <div>
      <button class="btn btn-primary" onclick="inviteUser()">Invite</button>
      <button class="btn btn-secondary" onclick="hidePanel('invitePanel')">Cancel</button>
    </div>
    <div class="info" id="inviteInfo"></div>
    <hr>
    <label>Add invited user to current channel</label>
    <input id="addUserId" placeholder="User ID (auto-filled after invite)" />
    <button class="btn btn-secondary" onclick="addMember()">Add to Channel</button>
  </div>
</div>

<!-- DM Panel -->
<div class="panel-overlay" id="dmPanel">
  <div class="panel">
    <h3>Start Direct Message</h3>
    <label>User ID</label>
    <input id="dmUserId" placeholder="Paste user UUID" />
    <div>
      <button class="btn btn-primary" onclick="createDm()">Start DM</button>
      <button class="btn btn-secondary" onclick="hidePanel('dmPanel')">Cancel</button>
    </div>
  </div>
</div>

<!-- Log toggle -->
<button class="log-toggle" onclick="document.getElementById('logPanel').classList.toggle('show')">Activity Log</button>
<div class="log-panel" id="logPanel"></div>

<script>
const BASE = window.location.origin;
let token = null, ws = null, channelId = null, channels = [];
let myUserId = null, myDisplayName = null, myTenantId = null;
const userNames = {};
const avatarColors = ['#e01e5a','#36c5f0','#2eb67d','#ecb22e','#8b5cf6','#e94560','#06b6d4','#f59e0b'];

function getAvatarColor(name) { let h=0; for(let i=0;i<(name||'').length;i++) h=name.charCodeAt(i)+((h<<5)-h); return avatarColors[Math.abs(h)%avatarColors.length]; }
function getInitial(name) { return (name||'?')[0].toUpperCase(); }

function showPanel(id) { document.getElementById(id).classList.add('show'); }
function hidePanel(id) { document.getElementById(id).classList.remove('show'); }

function toast(msg, isError) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:16px;right:16px;padding:10px 20px;border-radius:6px;font-size:13px;z-index:200;animation:fadeIn 0.3s;max-width:400px;';
  t.style.background = isError ? '#5c1a1a' : '#1a3a2a';
  t.style.color = isError ? '#e01e5a' : '#2bac76';
  t.style.border = '1px solid ' + (isError ? '#e01e5a33' : '#2bac7633');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function logMsg(msg) {
  const el = document.getElementById('logPanel');
  el.innerHTML += '<div>' + new Date().toLocaleTimeString() + ' ' + msg.replace(/</g,'&lt;') + '</div>';
  el.scrollTop = el.scrollHeight;
}

function setStatus(connected) {
  const el = document.getElementById('wsStatus');
  el.className = connected ? 'connected' : 'disconnected';
  el.textContent = connected ? 'Connected' : 'Disconnected';
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  logMsg('-> ' + method + ' ' + path);
  const res = await fetch(BASE + path, opts);
  const data = await res.json();
  logMsg('<- ' + res.status + ' ' + (data.success ? 'OK' : data.message));
  return data;
}

async function register() {
  const r = await api('POST', '/api/v1/auth/register', {
    tenantName: document.getElementById('slug').value, tenantSlug: document.getElementById('slug').value,
    email: document.getElementById('email').value, displayName: document.getElementById('name').value,
    password: document.getElementById('pass').value
  });
  if (r.success) { setAuth(r.data); hidePanel('authPanel'); listChannels(); }
  else { document.getElementById('authInfo').innerHTML = '<span class="error">' + r.message + '</span>'; }
}

async function login() {
  const r = await api('POST', '/api/v1/auth/login', {
    tenantSlug: document.getElementById('slug').value, email: document.getElementById('email').value,
    password: document.getElementById('pass').value
  });
  if (r.success) { setAuth(r.data); hidePanel('authPanel'); listChannels(); }
  else { document.getElementById('authInfo').innerHTML = '<span class="error">' + r.message + '</span>'; }
}

function setAuth(data) {
  token = data.token; myUserId = data.userId; myDisplayName = data.displayName; myTenantId = data.tenantId;
  userNames[myUserId] = myDisplayName;
  document.getElementById('workspaceName').textContent = document.getElementById('slug').value;
  document.getElementById('userInfo').innerHTML = data.displayName + ' <span style="color:var(--text-muted)">(' + data.role + ')</span>' +
    '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;cursor:pointer" onclick="navigator.clipboard.writeText(\'' + data.userId + '\');toast(\'User ID copied\')" title="Click to copy">User: ' + data.userId.substring(0,8) + '...</div>' +
    '<div style="font-size:10px;color:var(--text-muted);cursor:pointer" onclick="navigator.clipboard.writeText(\'' + data.tenantId + '\');toast(\'Tenant ID copied\')" title="Click to copy">Tenant: ' + data.tenantId.substring(0,8) + '...</div>';
  document.getElementById('authInfo').textContent = 'Logged in as ' + data.displayName;
  toast('Logged in as ' + data.displayName);
  connectWs();
}

function connectWs() {
  if (ws) ws.close();
  const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(wsProto + '//' + window.location.host + '/ws?token=' + token);
  ws.onopen = () => { setStatus(true); };
  ws.onclose = () => { setStatus(false); };
  ws.onerror = () => { logMsg('WS ERROR'); };
  ws.onmessage = (e) => {
    logMsg('WS <- ' + e.data.substring(0, 100));
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'message.new') {
        const d = msg.data || {};
        if (d.senderId === myUserId) return;
        if (msg.channelId !== channelId) return;
        const name = d.senderName || userNames[d.senderId] || (d.senderId || '').substring(0,8);
        appendMessage(name, d.content, d.createdAt, d.mediaUrl, d.messageType);
      }
    } catch(err) {}
  };
}

async function listChannels() {
  const r = await api('GET', '/api/v1/channels');
  if (!r.success) return;
  channels = r.data;
  const list = document.getElementById('channelList');
  list.innerHTML = '';
  r.data.forEach(c => {
    const li = document.createElement('li');
    const icon = c.type === 'DM' ? '\uD83D\uDCAC' : c.type === 'PRIVATE' ? '\uD83D\uDD12' : '#';
    li.textContent = icon + ' ' + (c.name || 'Direct Message');
    li.onclick = () => selectChannel(c);
    if (c.id === channelId) li.className = 'active';
    list.appendChild(li);
  });
}

function selectChannel(ch) {
  channelId = ch.id;
  const prefix = ch.type === 'DM' ? '\uD83D\uDCAC ' : ch.type === 'PRIVATE' ? '\uD83D\uDD12 ' : '# ';
  const displayName = ch.name || 'Direct Message';
  document.getElementById('activeChannelName').textContent = prefix + displayName;
  document.getElementById('activeChannelMeta').textContent = ch.type + ' | ' + (ch.memberCount || 0) + ' members | ID: ' + ch.id.substring(0,8) + '...';
  document.getElementById('msgInput').placeholder = 'Message ' + displayName + '...';
  listChannels();
  loadHistory();
}

async function createChannel() {
  const name = document.getElementById('chName').value;
  const type = document.getElementById('chType').value;
  const r = await api('POST', '/api/v1/channels', { name, type });
  if (r.success) { hidePanel('createChPanel'); selectChannel(r.data); listChannels(); toast('Channel "' + name + '" created'); }
  else { toast(r.message, true); }
}

async function createDm() {
  const userId = document.getElementById('dmUserId').value;
  if (!userId) { toast('Enter a user ID', true); return; }
  const r = await api('POST', '/api/v1/dm', { userId });
  if (r.success) { hidePanel('dmPanel'); selectChannel(r.data); listChannels(); toast('DM opened'); }
  else { toast(r.message, true); }
}

async function inviteUser() {
  const email = document.getElementById('inviteEmail').value;
  const name = document.getElementById('inviteName').value || email.split('@')[0];
  const pass = document.getElementById('invitePass').value || 'password123';
  if (!email) { toast('Email required', true); return; }
  const r = await api('POST', '/api/v1/users', { email, displayName: name, password: pass });
  if (r.success) {
    document.getElementById('addUserId').value = r.data.userId;
    document.getElementById('dmUserId').value = r.data.userId;
    document.getElementById('inviteInfo').innerHTML = 'Invited <b>' + r.data.displayName + '</b><br><span style="font-size:10px;color:var(--text-muted)">ID: ' + r.data.userId + '</span>';
    userNames[r.data.userId] = r.data.displayName;
    toast(r.data.displayName + ' invited to workspace');
  } else { document.getElementById('inviteInfo').innerHTML = '<span class="error">' + r.message + '</span>'; toast(r.message, true); }
}

async function addMember() {
  const userId = document.getElementById('addUserId').value;
  if (!channelId || !userId) { toast('Select a channel and enter user ID', true); return; }
  const r = await api('POST', '/api/v1/channels/' + channelId + '/members', { userIds: [userId] });
  if (r.success) { toast(r.message); document.getElementById('inviteInfo').textContent = r.message; }
  else { toast(r.message, true); document.getElementById('inviteInfo').innerHTML = '<span class="error">' + r.message + '</span>'; }
}

async function sendMsg() {
  const content = document.getElementById('msgInput').value;
  if (!channelId || !content) return;
  const r = await api('POST', '/api/v1/channels/' + channelId + '/messages', { content });
  if (r.success) {
    appendMessage(myDisplayName + ' (You)', content, r.data.createdAt, r.data.mediaUrl, r.data.messageType);
    document.getElementById('msgInput').value = '';
  }
}

async function uploadAndSendMedia() {
  const fileInput = document.getElementById('mediaFile');
  const infoEl = document.getElementById('mediaInfo');
  if (!channelId || !fileInput.files.length) return;
  const file = fileInput.files[0];
  infoEl.textContent = 'Uploading ' + file.name + '...';
  const urlResp = await api('POST', '/api/v1/media/upload-url', { fileName: file.name, contentType: file.type || 'application/octet-stream', sizeBytes: file.size });
  if (!urlResp.success) { infoEl.textContent = 'Error: ' + urlResp.message; fileInput.value=''; return; }
  try { await fetch(urlResp.data.uploadUrl, { method: 'PUT', headers: { 'Content-Type': file.type }, body: file }); } catch(e) { /* MinIO CORS */ }
  const msgResp = await api('POST', '/api/v1/channels/' + channelId + '/messages', { content: file.name, mediaUrl: urlResp.data.readUrl, mediaType: file.type });
  if (msgResp.success) { appendMessage(myDisplayName + ' (You)', msgResp.data.content, msgResp.data.createdAt, msgResp.data.mediaUrl, msgResp.data.messageType); }
  fileInput.value = ''; infoEl.textContent = '';
}

async function loadHistory() {
  if (!channelId) return;
  const r = await api('GET', '/api/v1/channels/' + channelId + '/messages?limit=50');
  if (!r.success) return;
  document.getElementById('messages').innerHTML = '';
  r.data.reverse().forEach(m => {
    const name = m.senderId === myUserId ? myDisplayName + ' (You)' : (m.senderName || userNames[m.senderId] || m.senderId.substring(0,8));
    appendMessage(name, m.content, m.createdAt, m.mediaUrl, m.messageType);
  });
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }

function appendMessage(sender, content, time, mediaUrl, messageType) {
  const el = document.getElementById('messages');
  const t = time ? new Date(time).toLocaleTimeString() : '';
  const color = getAvatarColor(sender);
  const initial = getInitial(sender);

  let mediaHtml = '';
  if (mediaUrl && mediaUrl !== 'null') {
    if (mediaUrl.match(/\.(png|jpg|jpeg|gif|webp)/i)) {
      mediaHtml = '<div class="msg-media"><img src="' + escapeHtml(mediaUrl) + '" onclick="window.open(this.src)" onerror="this.outerHTML=\'<a href=&quot;'+escapeHtml(mediaUrl)+'&quot; target=_blank>Download</a>\'"/></div>';
    } else {
      mediaHtml = '<div class="msg-media"><a href="' + escapeHtml(mediaUrl) + '" target="_blank">&#x1F4CE; Download ' + escapeHtml(content||'file') + '</a></div>';
    }
  }

  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = '<div class="msg-avatar" style="background:'+color+'">'+initial+'</div>' +
    '<div class="msg-body"><div class="msg-header"><span class="msg-sender">'+escapeHtml(sender)+'</span><span class="msg-time">'+escapeHtml(t)+'</span></div>' +
    '<div class="msg-content">'+escapeHtml(content||'')+mediaHtml+'</div></div>';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// Auto-show auth panel on load
window.onload = () => showPanel('authPanel');
</script>
</body>
</html>
