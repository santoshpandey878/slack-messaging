server:
  port: 8084

spring:
  application:
    name: media-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/slackmsg}
    username: ${DB_USERNAME:slackuser}
    password: ${DB_PASSWORD:slackpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:s3cr3t-k3y-f0r-sl4ck-m3ss4g1ng-syst3m-ch4ng3-1n-pr0d}
  expiration-ms: ${JWT_EXPIRY_MS:900000}
  refresh-expiration-ms: 604800000

app:
  max-channels-per-tenant: 1000
  max-members-per-channel: 10000
  max-message-size-bytes: 40960
  rate-limit:
    tenant-per-second: 100
    user-per-second: 10

# Inter-service URLs
services:
  auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  channel-url: ${CHANNEL_SERVICE_URL:http://localhost:8082}
  message-url: ${MESSAGE_SERVICE_URL:http://localhost:8083}
  media-url: ${MEDIA_SERVICE_URL:http://localhost:8084}
  ws-url: ${WS_GATEWAY_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.slackmsg: ${LOG_LEVEL:DEBUG}

storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  bucket: ${STORAGE_BUCKET:slack-media}
  region: ${STORAGE_REGION:us-east-1}
  presigned-url-expiry-minutes: 60
