server:
  port: 8080

spring:
  application:
    name: slack-messaging

  # PostgreSQL
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/slackmsg}
    username: ${DB_USERNAME:slackuser}
    password: ${DB_PASSWORD:slackpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 4

# JWT — secret MUST be set via environment variable in production
jwt:
  secret: ${JWT_SECRET:s3cr3t-k3y-f0r-sl4ck-m3ss4g1ng-syst3m-ch4ng3-1n-pr0d}
  expiration-ms: ${JWT_EXPIRY_MS:900000}
  refresh-expiration-ms: 604800000

# MinIO / S3
storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  bucket: ${STORAGE_BUCKET:slack-media}
  region: ${STORAGE_REGION:us-east-1}
  presigned-url-expiry-minutes: 60

# App config
app:
  max-channels-per-tenant: 1000
  max-members-per-channel: 10000
  max-message-size-bytes: 40960
  rate-limit:
    tenant-per-second: 100
    user-per-second: 10
  ws:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000}

# Actuator (health, metrics, monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: slack-messaging

# Logging
logging:
  level:
    root: INFO
    com.slackmsg: ${LOG_LEVEL:DEBUG}
    org.springframework.web.socket: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{tenantId}] %msg%n"

